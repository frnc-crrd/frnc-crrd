name: Rotate profile theme

on:
  schedule:
    - cron: "0 8 * * *"        # every day at 08:00 UTC (02:00 CST Mexico)
  workflow_dispatch:           # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rotate theme
        run: python3 scripts_rotate_theme.py
      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: rotate profile theme"
            git push
          fi
